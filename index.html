<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Ica — Casa Olandeză</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f5f0eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 32px;
    }

    .welcome {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9a8c7e;
    }

    .title {
      font-size: 28px;
      color: #3d3530;
      font-weight: normal;
    }

    .photo-link {
      display: block;
      position: relative;
      cursor: pointer;
    }

    .photo-link img {
      width: 280px;
      border-radius: 50%;
      border: 4px solid #e8c97e;
      display: block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .photo-link:hover img {
      transform: scale(1.03);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }

    .play-hint {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #e8c97e;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-hint svg {
      width: 20px;
      height: 20px;
      fill: #3d3530;
      margin-left: 3px;
    }

    .subtitle {
      font-size: 16px;
      color: #7a6e65;
      text-align: center;
      line-height: 1.7;
      max-width: 280px;
    }

    .casa {
      font-size: 12px;
      color: #b0a090;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="welcome">Welcome</span>
    <h1 class="title">Meet Ica</h1>

    <a class="photo-link"
       href="https://studio.d-id.com/share?id=c05ca111ac5da019e1c4ed71d82c5b19&utm_source=copy"
       target="_blank"
       rel="noopener">
      <img src="Jenica.png" alt="Ica — Casa Olandeză">
      <div class="play-hint">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </a>

    <p class="subtitle">Click on Ica to hear her welcome you to Casa Olandeză.</p>
    <span class="casa">Casa Olandeză · Găiseni</span>
  </div>

</body>
</html>
